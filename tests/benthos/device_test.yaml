              hdop: 6
              lat: 522721466
              lon: -9014316
              sat: 20
              spd: 65535
            prt: 0
            signals:
              "29": "37FF"
              "100": "012C"
              "101": "D5"
              "109": "7F"
              "359": "9"
            trigger: 7
    output_batches:
      - - {} # replay of original message
