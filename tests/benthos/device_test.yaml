    target_processors: "../../charts/dis/files/streams/external-ingest.yaml#/pipeline/processors"
    environment:
      DIMO_REGISTRY_CHAIN_ID: 137
      VEHICLE_NFT_ADDRESS: "0xbA5738a18d83D41847dfFbDC6101d37C69c9B0cF"
