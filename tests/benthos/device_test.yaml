  # ── Ruptela Combined Status+Event CE Conversion ──────────────────────────
  # When OIDs 135/136/143 have non-zero values, the CE conversion produces
  # both dimo.status and dimo.event CloudEvents from a single r/v0/s payload
  - name: "Ruptela Status With Events CloudEvent Conversion"
    target_processors: "../../charts/dis/files/streams/external-ingest.yaml#convert_cloudevent"
    environment:
      VEHICLE_NFT_ADDRESS: "0xbA5738a18d83D41847dfFbDC6101d37C69c9B0cF"
      AFTERMARKET_NFT_ADDRESS: "0x9c94C395cBcBDe662235E0A9d3bB87Ad708561BA"
      DIMO_REGISTRY_CHAIN_ID: 137
      RPC_URL: https://rpc-amoy.polygon.technology/
    input_batch:
      - metadata:
          dimo_message_content: 'dimo_content_connection'
          dimo_cloudevent_source: "0xF26421509Efe92861a587482100c6d728aBf1CD0"
        json_content:
          ds: "r/v0/s"
          signature: "0xabc123"
          time: "2024-09-27T08:33:26Z"
          vehicleTokenId: 12
          deviceTokenId: 392
          data:
            pos:
              alt: 1048
              dir: 7370
              hdop: 6
              lat: 522721466
              lon: -9014316
              sat: 20
              spd: 65535
            prt: 0
            signals:
              "29": "37FF"
              "135": "35"
              "136": "A"
              "143": "7"
            trigger: 7
    output_batches:
      - - json_contains:
            specversion: "1.0"
            source: "0xF26421509Efe92861a587482100c6d728aBf1CD0"
            type: "dimo.status"
            dataversion: "r/v0/s"
            subject: "did:erc721:137:0xbA5738a18d83D41847dfFbDC6101d37C69c9B0cF:12"
            producer: "did:erc721:137:0x9c94C395cBcBDe662235E0A9d3bB87Ad708561BA:392"
            datacontenttype: "application/json"
            signature: "0xabc123"
            time: "2024-09-27T08:33:26Z"
        - json_contains:
            specversion: "1.0"
            source: "0xF26421509Efe92861a587482100c6d728aBf1CD0"
            type: "dimo.events"
            dataversion: "r/v0/s"
            subject: "did:erc721:137:0xbA5738a18d83D41847dfFbDC6101d37C69c9B0cF:12"
            producer: "did:erc721:137:0x9c94C395cBcBDe662235E0A9d3bB87Ad708561BA:392"
            datacontenttype: "application/json"
            signature: "0xabc123"
            time: "2024-09-27T08:33:26Z"

